version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: ai-assessment-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-assessment
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ai-assessment-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-assessment-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/ai-assessment
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://frontend:3000
      NODE_ENV: production
      GROQ_API_KEY: ${GROQ_API_KEY}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend Worker (processes queue jobs)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-assessment-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ai-assessment
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      GROQ_API_KEY: ${GROQ_API_KEY}
    command: node dist/worker.js
    networks:
      - app-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-assessment-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
    networks:
      - app-network

volumes:
  mongo_data:
  redis_data:

networks:
  app-network:
    driver: bridge
